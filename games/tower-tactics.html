<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tower Tactics | BrightQuest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0a0f1a;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    header {
      padding: 10px;
      background: #111827;
      border-bottom: 2px solid #1f2937;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header img {
      height: 60px;
      border-radius: 6px;
    }
    #gameCanvas {
      display: block;
      margin: auto;
      background: #1a2332;
      border: 3px solid #374151;
      border-radius: 10px;
    }
    #ui {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border-radius: 8px;
      width: 200px;
    }
    .tower-btn {
      width: 100%;
      margin-bottom: 6px;
      padding: 6px;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <header>
    <img src="tower-tactics-logo.png" alt="Tower Tactics Logo">
    <h1>Tower Tactics</h1>
  </header>

  <canvas id="gameCanvas" width="960" height="540"></canvas>

  <div id="ui">
    <h3>Towers</h3>
    <button class="tower-btn" onclick="selectTower('arrow')">Arrow Tower</button>
    <button class="tower-btn" onclick="selectTower('pulse')">Pulse Tower</button>
    <button class="tower-btn" onclick="selectTower('rail')">Railgun Tower</button>
  </div>

  <script src="tower-tactics.js"></script>
</body>
</html>
