<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Escape</title>

    <link rel="stylesheet" href="../css/styles.css">

    <style>
        body {
            margin: 0;
            background: #020617;
            font-family: "Nunito", sans-serif;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            margin: auto;
            background: #0b1120;
        }

        .ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #f97316;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 0 6px black;
        }
    </style>
</head>

<body>
    <div class="ui">
        Dungeon Escape<br>
        <span id="statusDisplay">Avoid traps, reach the exit.</span>
    </div>

    <canvas id="gameCanvas" width="640" height="640"></canvas>

    <script src="../js/dungeon-escape.js"></script>
</body>
</html>
