<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Chess</title>

    <link rel="stylesheet" href="../css/styles.css">

    <style>
        body {
            margin: 0;
            background: #0f0f1a;
            font-family: "Nunito", sans-serif;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            margin: auto;

        }

        .ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00eaff;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 6px black;
        }
    </style>
</head>

<body>
    <div class="ui">
        Quantum Chess<br>
        <span id="statusDisplay">Your Move</span>
    </div>

    <canvas id="gameCanvas" width="640" height="640"></canvas>

    <script src="../js/quantum-chess.js"></script>
