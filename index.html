<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrightQuest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HERO SECTION -->
  <header class="hero">
    <h1>BrightQuest</h1>
    <p class="tagline">A safe, fun place for kids to play and learn</p>
  </header>

  <main>

    <!-- AGE SELECTOR -->
    <section class="card">
      <h2>Choose Your Age</h2>
      <p class="subtext">We’ll show games made just for you</p>

      <div class="age-input-area">
        <input type="number" id="age-input" min="4" max="18" placeholder="Enter your age">
        <button id="age-button">Find Games</button>
      </div>

      <p id="age-error" class="error"></p>
    </section>

    <!-- GAME LIST -->
    <section class="card">
      <h2>Your Games</h2>
      <div id="games-container" class="games-grid">
        <!-- Game cards will be inserted here -->
      </div>
    </section>

    <!-- TEEN CHAT -->
    <section id="chat-section" class="card">
      <h2>Teen Chat (13–18)</h2>
      <p class="note">Be kind. No bullying. No sharing personal info.</p>

      <div id="chat-box" class="chat-box">
        <ul id="chat-messages"></ul>
      </div>

      <div class="chat-input-area">
        <input type="text" id="chat-user-id" placeholder="Nickname">
        <input type="text" id="chat-message" placeholder="Type your message">
        <button id="chat-send">Send</button>
      </div>
    </section>

  </main>

  <footer>
    <p>BrightQuest © 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
