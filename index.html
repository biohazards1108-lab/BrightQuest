<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrightQuest</title>

    <!-- Basic styling -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #7ecbff, #fff6a3);
            overflow-x: hidden;
        }

        #logo {
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            margin-top: 30px;
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* Mascot */
        #mascot-container {
            width: 100%;
            text-align: center;
            margin-top: 40px;
            animation: fadeIn 1.5s ease;
        }

        #mascot {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #fff, #a6e1ff);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.7);
            animation: mascotPop 1.2s ease;
        }

        #mascot img {
            width: 120px;
            height: auto;
        }

        /* Speech bubble */
        #speech {
            margin-top: 20px;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            width: 70%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            animation: fadeInUp 1.2s ease;
        }

        /* Age buttons */
        #age-select {
            margin-top: 40px;
            text-align: center;
            animation: fadeInUp 1.4s ease;
        }

        .age-btn {
            padding: 20px 30px;
            margin: 15px;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .age-btn:hover {
            transform: scale(1.08);
        }

        .age-4-7 {
            background: #ffb3d1;
        }

        .age-8-12 {
            background: #b3ffd9;
        }

        .age-13-18 {
            background: #b3c6ff;
        }

        /* Footer */
        footer {
            margin-top: 60px;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #444;
        }

        /* Animations */
        @keyframes mascotPop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div id="logo">BrightQuest</div>

    <div id="mascot-container">
        <div id="mascot">
            <!-- Placeholder mascot image -->
            <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" alt="Questy Mascot">
        </div>
    </div>

    <div id="speech">
        Hey there, adventurer! I’m <strong>Questy</strong>, your guide through BrightQuest — a world where you can
        play games, learn new skills, explore cool ideas, and discover your brightest path.  
        Ready to begin your quest?
    </div>

    <div id="age-select">
        <button class="age-btn age-4-7" onclick="selectAge('4-7')">🌈 Ages 4–7 — Play & Explore</button>
        <button class="age-btn age-8-12" onclick="selectAge('8-12')">⭐ Ages 8–12 — Create & Discover</button>
        <button class="age-btn age-13-18" onclick="selectAge('13-18')">🚀 Ages 13–18 — Level Up & Learn</button>
    </div>

    <footer>
        Safe • Fun • Educational • Free  
        <br>BrightQuest © 2026
    </footer>

    <!-- JS Logic -->
    <script>
        function selectAge(group) {
            // Redirect to age-specific pages (you will create these later)
            window.location.href = `/age/${group}.html`;
        }

        /*
            -----------------------------------------
            Railway + PostgreSQL Integration (Starter)
            -----------------------------------------
            This is a placeholder fetch call you can
            connect to your Railway backend once your
            Express server + PostgreSQL is ready.

            Example backend route:
            GET https://your-railway-app.up.railway.app/api/status
        */

        async function checkBackend() {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();
                console.log("Backend status:", data);
            } catch (err) {
                console.warn("Backend not connected yet.");
            }
        }

        checkBackend();
    </script>

</body>
</html>
